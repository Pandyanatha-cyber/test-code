<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="description" content="Email page for testing">
        <meta name="keywords" content="Email Page">
        <meta name="author"   content="Arka Arganta Pandyanatha">
        <link href="https://fonts.googleapis.com/css?family=Raleway" rel="stylesheet">
        <link href="./assets/registerstyle.css" rel="stylesheet">
        <title>Email Page</title>
    </head>
    <body>
        <div class="header-email">
          <!-- header part for the JPGs -->
          <img src="./assets/logo.png" class="header-logo" /> 
          <img src="./assets/header.jpg" class="header-banner" />
        </div>
    <form action="index.html" method="post">
    <table class="data">
        <tr>
            <td colspan="2">
                <h2><label for="registration">User Register</label></h2>
            </td>
        </tr>
        <tr>
            <td><label for="username">Full Name:</label></td>
            <td><input type="text" id="username" name="username" placeholder="Enter your name"></td>
        </tr>
        
        <tr>
            <td><label for="useremail">Email Address:</label></td>
            <td><input type="email" id="useremail" name="useremail" placeholder="name@example.com"></td>
        </tr>
        <tr>
            <td colspan="2" style="text-align: center;">
                <button type="submit">Submit Data</button>
            </td>
        </tr>
    </table>
</form>
</body>
